name: Action authoring docs

on:
  workflow_dispatch:
  push:
    paths:
      - 'docs/action-authoring-src/**'
      - 'docs/action-authoring/**'
      - 'scripts/generate-authoring-docs.mjs'
      - 'scripts/Generate-ActionAuthoringDocs.ps1'
      - 'build/GenerateActionAuthoringDocs.targets'
      - '.github/workflows/docs-check.yml'
  pull_request:
    paths:
      - 'docs/action-authoring-src/**'
      - 'docs/action-authoring/**'
      - 'scripts/generate-authoring-docs.mjs'
      - 'scripts/Generate-ActionAuthoringDocs.ps1'
      - 'build/GenerateActionAuthoringDocs.targets'
      - '.github/workflows/docs-check.yml'

jobs:
  docs-check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'

      - name: Verify generated docs match templates
        run: node scripts/generate-authoring-docs.mjs --check
