name: Release qkrpc CLI

# Builds qkrpc CLI zip + Inno setup, and QuickerAgent Tauri NSIS installer on tag push.
on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Existing tag to build (e.g. v0.3.9). Leave empty when triggered by tag push.'
        required: false
        type: string

permissions:
  contents: write

concurrency:
  group: release-cli-${{ github.ref }}
  cancel-in-progress: false

jobs:
  metadata:
    runs-on: windows-latest
    outputs:
      tag: ${{ steps.tag.outputs.tag }}
      semver: ${{ steps.tag.outputs.semver }}
      zip_name: ${{ steps.tag.outputs.zip_name }}
      setup_name: ${{ steps.tag.outputs.setup_name }}
      agent_setup_name: ${{ steps.tag.outputs.agent_setup_name }}
      version_full: ${{ steps.version.outputs.full }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Resolve tag
        id: tag
        shell: pwsh
        run: |
          if ('${{ github.event_name }}' -eq 'workflow_dispatch' -and '${{ inputs.tag }}' -ne '') {
            $tag = '${{ inputs.tag }}'.Trim()
          } else {
            $tag = '${{ github.ref_name }}'.Trim()
          }
          if ($tag -notmatch '^v') { throw "Tag must start with v: $tag" }
          $semver = $tag.Substring(1)
          "tag=$tag" >> $env:GITHUB_OUTPUT
          "semver=$semver" >> $env:GITHUB_OUTPUT
          "zip_name=qkrpc-$semver-win-x64.zip" >> $env:GITHUB_OUTPUT
          "setup_name=qkrpc-$semver-win-x64-setup.exe" >> $env:GITHUB_OUTPUT
          "agent_setup_name=quicker-agent-$semver-x64-setup.exe" >> $env:GITHUB_OUTPUT

      - name: Read version.json
        id: version
        shell: pwsh
        run: |
          $json = Get-Content version.json -Raw | ConvertFrom-Json
          $full = [string]$json.QuickerRpc
          if ([string]::IsNullOrWhiteSpace($full)) { throw 'version.json missing QuickerRpc' }
          "full=$full" >> $env:GITHUB_OUTPUT

  build-cli:
    runs-on: windows-latest
    needs: metadata
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '10.0.x'
          cache: true
          cache-dependency-path: |
            **/*.csproj
            **/packages.lock.json
            global.json

      - name: Publish CLI
        shell: pwsh
        run: |
          $publishDir = Join-Path $PWD 'publish/cli'
          New-Item -ItemType Directory -Path $publishDir -Force | Out-Null
          dotnet publish QuickerRpc.Console/QuickerRpc.Console.csproj `
            -c Release -r win-x64 --self-contained true `
            -p:PublishSingleFile=false `
            -p:Version='${{ needs.metadata.outputs.version_full }}' `
            -o $publishDir `
            -v:q --nologo

      - name: Create zip
        shell: pwsh
        run: |
          $zipPath = Join-Path $PWD 'publish/${{ needs.metadata.outputs.zip_name }}'
          Compress-Archive -Path 'publish/cli/*' -DestinationPath $zipPath -CompressionLevel Optimal -Force
          Copy-Item -LiteralPath $zipPath -Destination (Join-Path $PWD 'publish/qkrpc-win-x64.zip') -Force

      - name: Ensure Inno Setup 6
        shell: pwsh
        run: |
          if (Get-Command ISCC.exe -ErrorAction SilentlyContinue) {
            Write-Host 'Inno Setup already available.'
          } else {
            choco install innosetup --no-progress -y
          }

      - name: Build setup.exe
        shell: pwsh
        run: |
          pwsh -NoProfile -File ./publish/Build-QkrpcSetup.ps1 -RepoRoot $PWD

      - name: Upload CLI artifacts
        uses: actions/upload-artifact@v4
        with:
          name: cli-artifacts
          path: |
            publish/${{ needs.metadata.outputs.zip_name }}
            publish/qkrpc-win-x64.zip
            publish/${{ needs.metadata.outputs.setup_name }}
            publish/qkrpc-win-x64-setup.exe
          if-no-files-found: error

  build-agent:
    runs-on: windows-latest
    needs: metadata
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Isolate USERPROFILE for Windows builds
        shell: pwsh
        run: |
          # Avoid Next/webpack scanning the runner profile (Documents junctions → EPERM).
          $t = $env:RUNNER_TEMP
          "USERPROFILE=$t" >> $env:GITHUB_ENV
          "HOME=$t" >> $env:GITHUB_ENV

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: pnpm
          cache-dependency-path: agent-gui/pnpm-lock.yaml

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: agent-gui/src-tauri

      - name: Ensure NSIS (Tauri bundler)
        shell: pwsh
        run: |
          if (Get-Command makensis.exe -ErrorAction SilentlyContinue) {
            Write-Host 'NSIS already available.'
          } else {
            choco install nsis -y --no-progress
          }

      - name: Generate action authoring docs
        run: node scripts/generate-authoring-docs.mjs

      - name: Build QuickerAgent installer
        shell: pwsh
        env:
          BUNDLED_LLM_BINGLEIMUZI_API_KEY: ${{ secrets.BUNDLED_LLM_BINGLEIMUZI_API_KEY }}
          BUNDLED_LLM_AI98PRO_API_KEY: ${{ secrets.BUNDLED_LLM_AI98PRO_API_KEY }}
          AGENT_GUI_DEFAULT_CWD: ${{ github.workspace }}
        run: |
          $bundledKey = $env:BUNDLED_LLM_BINGLEIMUZI_API_KEY
          if ([string]::IsNullOrWhiteSpace($bundledKey)) {
            $bundledKey = $env:BUNDLED_LLM_AI98PRO_API_KEY
          }
          if ([string]::IsNullOrWhiteSpace($bundledKey)) {
            throw 'GitHub secret BUNDLED_LLM_BINGLEIMUZI_API_KEY (or legacy BUNDLED_LLM_AI98PRO_API_KEY) is required for QuickerAgent release builds.'
          }
          $env:BUNDLED_LLM_BINGLEIMUZI_API_KEY = $bundledKey
          pwsh -NoProfile -File ./publish/Publish-QuickerAgent.ps1 -SkipQkrpcBuild

      - name: Upload agent artifacts
        uses: actions/upload-artifact@v4
        with:
          name: agent-artifacts
          path: |
            publish/${{ needs.metadata.outputs.agent_setup_name }}
            publish/quicker-agent-win-x64-setup.exe
          if-no-files-found: error

  release:
    runs-on: windows-latest
    needs:
      - metadata
      - build-cli
      - build-agent
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Download CLI artifacts
        uses: actions/download-artifact@v4
        with:
          name: cli-artifacts
          path: publish

      - name: Download agent artifacts
        uses: actions/download-artifact@v4
        with:
          name: agent-artifacts
          path: publish

      - name: Detect Bitiful upload config
        id: bitiful
        shell: pwsh
        env:
          BITIFUL_ACCESS_KEY: ${{ secrets.BITIFUL_ACCESS_KEY }}
          BITIFUL_SECRET_KEY: ${{ secrets.BITIFUL_SECRET_KEY }}
          BITIFUL_BUCKET_NAME: ${{ secrets.BITIFUL_BUCKET_NAME }}
        run: |
          $configured =
            -not [string]::IsNullOrWhiteSpace($env:BITIFUL_ACCESS_KEY) -and
            -not [string]::IsNullOrWhiteSpace($env:BITIFUL_SECRET_KEY) -and
            -not [string]::IsNullOrWhiteSpace($env:BITIFUL_BUCKET_NAME)
          if ($configured) {
            "configured=true" >> $env:GITHUB_OUTPUT
            Write-Host 'Bitiful upload enabled (secrets present).'
          } else {
            "configured=false" >> $env:GITHUB_OUTPUT
            Write-Host 'Bitiful secrets not configured; upload steps will be skipped.'
          }

      - name: Setup Python for Bitiful upload
        if: steps.bitiful.outputs.configured == 'true'
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Upload QuickerAgent installer to Bitiful
        if: steps.bitiful.outputs.configured == 'true'
        shell: pwsh
        env:
          BITIFUL_ACCESS_KEY: ${{ secrets.BITIFUL_ACCESS_KEY }}
          BITIFUL_SECRET_KEY: ${{ secrets.BITIFUL_SECRET_KEY }}
          BITIFUL_BUCKET_NAME: ${{ secrets.BITIFUL_BUCKET_NAME }}
          BITIFUL_ENDPOINT_URL: ${{ vars.BITIFUL_ENDPOINT_URL }}
          BITIFUL_OBJECT_PREFIX: ${{ vars.BITIFUL_OBJECT_PREFIX }}
          AGENT_SETUP_NAME: ${{ needs.metadata.outputs.agent_setup_name }}
        run: |
          python -m pip install --disable-pip-version-check --quiet boto3
          python - <<'PY'
          import os
          from pathlib import Path
          import boto3
          from botocore.config import Config

          workspace = Path.cwd()
          local_file = workspace / "publish" / os.environ["AGENT_SETUP_NAME"]
          if not local_file.exists():
              raise FileNotFoundError(f"Installer not found: {local_file}")

          endpoint_url = (os.getenv("BITIFUL_ENDPOINT_URL") or "https://s3.bitiful.net").strip()
          prefix = (os.getenv("BITIFUL_OBJECT_PREFIX") or "quicker-rpc/quicker-agent").strip().strip("/")
          latest_alias = "quicker-agent-win-x64-setup.exe"
          object_key = f"{prefix}/{local_file.name}"
          latest_object_key = f"{prefix}/{latest_alias}"
          version_txt_key = f"{prefix}/version.txt"
          file_name = local_file.name
          version_marker = file_name.replace("quicker-agent-", "").replace("-x64-setup.exe", "").strip()
          if not version_marker or version_marker == file_name:
              raise RuntimeError(f"Unable to parse semver from file name: {file_name}")

          s3_client = boto3.client(
              "s3",
              endpoint_url=endpoint_url,
              aws_access_key_id=os.environ["BITIFUL_ACCESS_KEY"],
              aws_secret_access_key=os.environ["BITIFUL_SECRET_KEY"],
              region_name="us-east-1",
              config=Config(signature_version="s3v4", retries={"max_attempts": 3}),
          )
          s3_client.upload_file(
              str(local_file),
              os.environ["BITIFUL_BUCKET_NAME"],
              object_key,
              ExtraArgs={"ContentType": "application/vnd.microsoft.portable-executable"},
          )
          s3_client.upload_file(
              str(local_file),
              os.environ["BITIFUL_BUCKET_NAME"],
              latest_object_key,
              ExtraArgs={"ContentType": "application/vnd.microsoft.portable-executable"},
          )
          s3_client.put_object(
              Bucket=os.environ["BITIFUL_BUCKET_NAME"],
              Key=version_txt_key,
              Body=version_marker.encode("utf-8"),
              ContentType="text/plain; charset=utf-8",
              CacheControl="no-cache, no-store, must-revalidate",
          )

          object_url = f"{endpoint_url.rstrip('/')}/{os.environ['BITIFUL_BUCKET_NAME']}/{object_key}"
          latest_url = f"{endpoint_url.rstrip('/')}/{os.environ['BITIFUL_BUCKET_NAME']}/{latest_object_key}"
          version_txt_url = f"{endpoint_url.rstrip('/')}/{os.environ['BITIFUL_BUCKET_NAME']}/{version_txt_key}"
          print(f"Uploaded to Bitiful: {object_key}")
          print(f"URL: {object_url}")
          print(f"Uploaded latest alias: {latest_object_key}")
          print(f"Latest URL: {latest_url}")
          print(f"Updated version marker: {version_txt_key} -> {version_marker}")
          print(f"Version URL: {version_txt_url}")
          with open(os.environ["GITHUB_STEP_SUMMARY"], "a", encoding="utf-8") as summary:
              summary.write("### Bitiful upload\n")
              summary.write(f"- File: `{local_file.name}`\n")
              summary.write(f"- Object key: `{object_key}`\n")
              summary.write(f"- URL: {object_url}\n")
              summary.write(f"- Latest key: `{latest_object_key}`\n")
              summary.write(f"- Latest URL: {latest_url}\n")
              summary.write(f"- Version key: `{version_txt_key}`\n")
              summary.write(f"- Version value: `{version_marker}`\n")
              summary.write(f"- Version URL: {version_txt_url}\n")
          PY

      - name: Generate release notes
        id: notes
        shell: pwsh
        run: |
          . ./publish/qkrpc-publish-lib.ps1
          $tag = '${{ needs.metadata.outputs.tag }}'
          $full = '${{ needs.metadata.outputs.version_full }}'
          $changelogPath = Get-QkrpcChangelogFilePath -RepoRoot $PWD -Tag $tag
          $changelog = Resolve-QkrpcChangelogContent -RepoRoot $PWD -Tag $tag
          if ([string]::IsNullOrWhiteSpace($changelog)) {
            Write-Warning "No changelog at $changelogPath; release notes will only include install instructions."
          } else {
            Write-Host "Using changelog: $changelogPath"
          }
          $body = New-QkrpcReleaseNotesBody -Tag $tag -VersionFull $full -Changelog $changelog
          $notesPath = Join-Path $env:RUNNER_TEMP 'qkrpc-release-notes.md'
          Set-Content -LiteralPath $notesPath -Value $body -Encoding utf8NoBOM
          "path=$notesPath" >> $env:GITHUB_OUTPUT

      - name: Upload release asset
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ needs.metadata.outputs.tag }}
          name: qkrpc ${{ needs.metadata.outputs.tag }}
          body_path: ${{ steps.notes.outputs.path }}
          files: |
            publish/${{ needs.metadata.outputs.zip_name }}
            publish/qkrpc-win-x64.zip
            publish/${{ needs.metadata.outputs.setup_name }}
            publish/qkrpc-win-x64-setup.exe
            publish/${{ needs.metadata.outputs.agent_setup_name }}
            publish/quicker-agent-win-x64-setup.exe
          draft: false
          prerelease: false
