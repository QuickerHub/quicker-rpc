<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>QuickerAgent</title>
    <style>
      :root {
        color-scheme: dark;
        --bg: #1a1a1a;
        --fg: #e8e8e8;
        --muted: #9a9a9a;
        --accent: #3b82f6;
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        margin: 0;
        width: 100%;
        height: 100%;
        overflow: hidden;
        background: var(--bg);
        color: var(--fg);
        font-family: "Segoe UI", system-ui, -apple-system, sans-serif;
      }

      .startup-shell {
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 20px;
        width: 100%;
        height: 100%;
        user-select: none;
      }

      .startup-logo {
        font-size: 1.25rem;
        font-weight: 600;
        letter-spacing: 0.02em;
      }

      .startup-spinner {
        width: 28px;
        height: 28px;
        border: 2px solid rgba(255, 255, 255, 0.12);
        border-top-color: var(--accent);
        border-radius: 50%;
        animation: spin 0.85s linear infinite;
      }

      .startup-message {
        margin: 0;
        font-size: 0.9rem;
        color: var(--muted);
      }

      @keyframes spin {
        to {
          transform: rotate(360deg);
        }
      }
    </style>
  </head>
  <body>
    <div class="startup-shell" role="status" aria-live="polite" aria-busy="true">
      <div class="startup-logo">QuickerAgent</div>
      <div class="startup-spinner" aria-hidden="true"></div>
      <p class="startup-message">正在启动…</p>
    </div>
  </body>
</html>
