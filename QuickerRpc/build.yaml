# qkbuild configuration for QuickerRpc plugin package
# Run from repo root: pwsh ./build.ps1
# Release upload: pwsh ./build.ps1 -Publish -NoVersion
# Test (-t): bumps version.json revision (4th field) only; copies DLL to _packages/quicker.rpc/M.m.b/ (no OSS upload)
# Publish (-p): interactive version pick (or --version / --publish-version / -y); -p -n uses current version.json without prompt
# Dual-host: -Publish runs V1 (net472 Plugin.V1) then V2 (net10 Plugin.V2, --no-version on 2nd pass). Use -Net10 -Publish for V2 only.

name: quicker-rpc
displayName: QuickerRpc
versionKey: QuickerRpc
projectDir: ./src/QuickerRpc.Plugin.V1

# Quicker package / subprogram (adjust to your action setup)
uploadDir: quicker.rpc
packageName: quicker.rpc
subprogramName: QuickerRpc_Run
instruction: Quicker plugin RPC bridge (StreamJsonRpc named pipe)

# V1 Costura embeds Microsoft.Extensions* + StreamJsonRpc deps. V2 (net10) uses Quicker host DI/Newtonsoft (qkref.net10.props); Costura embeds StreamJsonRpc + QuickerRpc.* only.
filesToInclude:
  - "QuickerRpc.Plugin*.dll"

filesToExclude:
  - "*.pdb"
  - "*.xml"

obfuscate: false

cleanupOldZips: true
enabled: true
